name: Release Extension

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Build + zip + upload artifact only; skip version bump, commit, tag, release and submit
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - apps/extension/**
      - packages/services/**
      - packages/utils/**
      - .github/workflows/release-extension.yml
      - .changeset/**
  pull_request:
    branches:
      - main
    paths:
      - apps/extension/**
      - packages/services/**
      - packages/utils/**
      - .github/workflows/release-extension.yml
      - .changeset/**

concurrency:
  group: release-extension
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

env:
  CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
  CHROME_CLIENT_ID: ${{ secrets.CHROME_EXTENSION_CLIENT_ID }}
  CHROME_CLIENT_SECRET: ${{ secrets.CHROME_EXTENSION_CLIENT_SECRET }}
  CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_EXTENSION_REFRESH_TOKEN }}
  VITE_AXIOM_TOKEN: ${{ secrets.EXTENSION_AXIOM_INGEST_TOKEN }}
  VITE_AXIOM_DATASET: ${{ secrets.EXTENSION_AXIOM_DATASET }}
  VITE_UFABC_NEXT_URL: https://api.v2.ufabcnext.com
  VITE_UFABC_PARSER_URL: https://ufabc-parser.com/v2
  VITE_LOG_LEVEL: info

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git bot author
        run: |
          git config user.email "github-actions@users.noreply.github.com"
          git config user.name "github-actions"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine if this is a full release
        id: is_release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dryRun }}" != "true" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find pending changesets
        id: find_changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name README.md 2>/dev/null | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Validate changesets only touch @next/extension
        if: steps.find_changesets.outputs.count != '0'
        run: node --experimental-strip-types .github/scripts/validate-changeset.ts

      - name: Block release with no pending changesets
        if: steps.is_release.outputs.value == 'true' && steps.find_changesets.outputs.count == '0'
        run: |
          echo "::error::No pending changesets in .changeset/. Run 'pnpm changeset' on the extension-lint-utils branch, commit the file, then dispatch the workflow again."
          exit 1

      - name: Apply changesets (version bump + CHANGELOG)
        if: steps.is_release.outputs.value == 'true' && steps.find_changesets.outputs.count != '0'
        working-directory: apps/extension
        run: pnpm changeset version

      - name: Read new extension version
        if: steps.is_release.outputs.value == 'true' && steps.find_changesets.outputs.count != '0'
        id: ext_version
        run: |
          version=$(node -p "require('./apps/extension/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "New extension version: ${version}"

      - name: Build extension
        run: pnpm turbo run build --filter=@next/extension

      - name: Zip extension
        run: pnpm turbo run zip --filter=@next/extension

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: apps/extension/.output/*.zip
          if-no-files-found: error
          include-hidden-files: true

      - name: Commit, tag and push release
        if: steps.is_release.outputs.value == 'true' && steps.find_changesets.outputs.count != '0'
        env:
          EXT_VERSION: ${{ steps.ext_version.outputs.version }}
        run: |
          git add apps/extension/package.json apps/extension/CHANGELOG.md .changeset
          git commit -m "chore(extension): release v${EXT_VERSION}"
          git tag "extension-v${EXT_VERSION}"
          git push
          git push origin "extension-v${EXT_VERSION}"

      - name: Create GitHub Release
        if: steps.is_release.outputs.value == 'true' && steps.find_changesets.outputs.count != '0'
        env:
          EXT_VERSION: ${{ steps.ext_version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "extension-v${EXT_VERSION}" \
            --title "Extension v${EXT_VERSION}" \
            --notes-file apps/extension/CHANGELOG.md \
            apps/extension/.output/*-chrome.zip

      - name: Verify Chrome Web Store credentials (dry-run)
        if: steps.is_release.outputs.value != 'true'
        working-directory: apps/extension
        run: |
          pnpm wxt submit --dry-run \
            --chrome-zip .output/*-chrome.zip \
            --chrome-extension-id "$CHROME_EXTENSION_ID" \
            --chrome-client-id "$CHROME_CLIENT_ID" \
            --chrome-client-secret "$CHROME_CLIENT_SECRET" \
            --chrome-refresh-token "$CHROME_REFRESH_TOKEN"

      - name: Submit to Chrome Web Store
        if: steps.is_release.outputs.value == 'true' && steps.find_changesets.outputs.count != '0'
        working-directory: apps/extension
        run: |
          pnpm wxt submit \
            --chrome-zip .output/*-chrome.zip \
            --chrome-extension-id "$CHROME_EXTENSION_ID" \
            --chrome-client-id "$CHROME_CLIENT_ID" \
            --chrome-client-secret "$CHROME_CLIENT_SECRET" \
            --chrome-refresh-token "$CHROME_REFRESH_TOKEN"
