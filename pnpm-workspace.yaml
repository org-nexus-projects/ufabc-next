packages:
  - apps/*
  - packages/*
  - tools/*
engineStrict: true
strictPeerDependencies: false
dedupePeerDependents: false
publicHoistPattern:
  - fastify
  - '@fastify/*'
  - '!@fastify/sensible'
  - pino
  - pino-pretty
  - '@axiomhq/*'
allowBuilds:
  cpu-features: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  protobufjs: true
  ssh2: true
  weak-napi: true
injectWorkspacePackages: true
onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild
  - msw
  - unrs-resolver
  - vue-demi
